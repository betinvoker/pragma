<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | OOO "ПРАГМА"</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-body text-center p-5">
            <h1 class="mb-4">Добро пожаловать, {{ user.first_name }}!</h1>
            <p class="lead text-muted">Вы вошли как: <strong>{{ user.get_role_display }}</strong></p>
            
            <div class="d-grid gap-3 col-6 mx-auto">
                {% if user.is_staff %}
                    <a href="/admin/" class="btn btn-primary btn-lg">Админ-панель</a>
                {% endif %}
                
                {% if user.role == 1 %}
                    <a href="#" class="btn btn-outline-success btn-lg">Мои заказы</a>
                    <a href="#" class="btn btn-outline-info btn-lg">AI-консультант</a>
                {% elif user.role == 2 %}
                    <a href="#" class="btn btn-outline-warning btn-lg">Заказы на обработке</a>
                {% endif %}
                
                <hr class="my-4">
                
                <form method="post" action="{% url 'users:logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-danger">Выйти</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
