{% extends 'base.html' %}
{% block content %}
<h2>Каталог</h2>

<div class="row mb-4">
  <div class="col-md-12">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-white">
        <button class="btn btn-link text-decoration-none w-100 text-start d-flex justify-content-between align-items-center" type="button" data-bs-toggle="collapse" data-bs-target="#addForm">
          <span><h5 class="mb-0">Добавить товар</h5></span>
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-chevron-down" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708z"/>
          </svg>
        </button>
      </div>
      <div class="collapse" id="addForm">
        <div class="card-body">
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Название товара</label>
              <input type="text" name="name" class="form-control" required>
            </div>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Цена</label>
                <input type="number" name="price" class="form-control" step="0.01" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Количество на складе</label>
                <input type="number" name="stock" class="form-control" required>
              </div>
              <div class="col-md-12">
                <label class="form-label">Описание</label>
                <textarea name="description" class="form-control" rows="3"></textarea>
              </div>
              <div class="col-md-12">
                <label class="form-label">Ссылка на изображение</label>
                <input type="text" name="link_image" class="form-control">
              </div>
            </div>
            <button class="btn btn-primary mt-3" type="submit">Добавить товар</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="card border-0 shadow-sm">
  <div class="card-body">
    <div class="table-responsive">
      <table class="table table-hover">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Описание</th>
            <th>Цена</th>
            <th>На складе</th>
          </tr>
        </thead>
        <tbody>
          {% for item in items %}
          <tr>
            <td>{{ item.id }}</td>
            <td>{{ item.name }}</td>
            <td>{{ item.description|default:"&mdash;" }}</td>
            <td>{{ item.price }} руб.</td>
            <td>{{ item.stock }}</td>
          </tr>
          {% empty %}
          <tr><td colspan="5" class="text-center">Нет товаров</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
